version: '3.8'

services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  web-client:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_PORT=5173
    depends_on:
      - api-server
    restart: always
